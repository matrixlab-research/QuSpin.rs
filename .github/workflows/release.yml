name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.10"
      - name: Check release versions
        run: python ci/check_versions.py --tag "$GITHUB_REF_NAME"
      - name: Test and package the Rust core
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          cargo test --all-targets
          cargo package
      - name: Build and test the shared language boundary
        run: |
          cargo test --manifest-path bindings/capi/Cargo.toml
          cargo build --release --manifest-path bindings/capi/Cargo.toml
      - name: Test Python
        env:
          PYTHONPATH: bindings/python/src
          QMBED_LIBRARY_PATH: bindings/capi/target/release/libqmbed_capi.so
        run: python -m unittest discover -s bindings/python/tests -v
      - name: Test Julia
        env:
          QMBED_LIBRARY_PATH: bindings/capi/target/release/libqmbed_capi.so
        run: julia --project=bindings/julia -e 'using Pkg; Pkg.instantiate(); Pkg.test()'
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --verify-tag
